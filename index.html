<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://feroonthy.github.io/">
  <title>Feroonthy</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column; /* عمودياً: الصورة ثم النص */
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    a img {
      width: 300px;
      cursor: pointer;
      border-radius: 10px; /* زاوية خفيفة للصورة */
      border: 2px solid #555; /* إطار خفيف للصورة */
    }

    .gold {
      font-size: 40px;
      font-weight: bold;
      background: linear-gradient(90deg, #FFD700, #fff5b7, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-top: 20px; /* مسافة بين الصورة والنص */
      padding: 10px 20px;
      border: 3px solid #C0C0C0; /* الإطار الفضي */
      border-radius: 15px; /* الزوايا المستديرة للفخامة */
      box-shadow: 0 0 15px rgba(192,192,192,0.7); /* توهج خفيف لإحساس بالثري */
    }

    a, img {
      -webkit-tap-highlight-color: transparent;
    }

    a:focus, a:active, img:active {
      outline: none;
      background: transparent;
    }

  </style>
</head>

<body>

  <a href="Feroonthy.html">
    <img src="IMG_٢٠٢٦٠٣١٦_٠٤٤٨٢٨.png" alt="Feroonthy Image">
  </a>


</body>
</html><body>
